name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy via rsync
        run: |
          for i in 1 2 3; do
            sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync \
              -avz --delete \
              -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15" \
              --exclude='.git*' \
              --exclude='CLAUDE.md' \
              --exclude='docs/' \
              --exclude='.github/' \
              ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/pvjcampamento.com/public_html/ \
            && break || { echo "Attempt $i failed, retrying in 15s..."; sleep 15; }
          done
