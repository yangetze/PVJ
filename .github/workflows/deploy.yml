name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SCP
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp \
            -P ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            index.html calculadora.html donaciones.html styles.css components.js main.js donaciones.js .htaccess \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/public_html/

      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "echo '=== Home directory ===' && pwd && ls -la && echo '=== public_html ===' && ls -la ~/public_html/ 2>&1 || echo 'public_html not found or empty'"
