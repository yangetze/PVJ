<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pago — PVJ 2026</title>
    <meta name="description" content="Calcula el equivalente en bolívares de tu inscripción al Campamento PVJ 2026 según la Tasa Euro BCV del día.">
    <meta http-equiv="refresh" content="0; url=pagos.html#calculadora">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER & NAVIGATION — rendered by components.js -->
    <header></header>

    <!-- CALCULATOR PAGE -->
    <main class="calc-page">
        <div class="container">

            <div class="calc-page-header">
                <a href="index.html#payment" class="calc-back-link">← Información de Pago</a>
                <h1 class="calc-page-title">Calculadora de Pago en Bolívares</h1>
                <p class="calc-page-subtitle">Convierte tu inscripción de euros a bolívares usando la Tasa Euro BCV de hoy</p>
            </div>

            <div class="calculator-card">
                <div class="calculator-header">
                    <h3 class="calculator-title">💱 Calculadora de Pago en Bolívares</h3>
                    <p class="calculator-subtitle">Convierte euros a Bs. según la Tasa Euro BCV de hoy</p>
                </div>
                <div class="calculator-body">
                    <div class="calculator-input-group">
                        <label class="calculator-label" for="euroInput">Monto en Euros</label>
                        <div class="calculator-input-wrapper">
                            <span class="calculator-currency-symbol">€</span>
                            <input type="number" id="euroInput" class="calculator-input" value="95" min="0" step="1" placeholder="95">
                        </div>
                    </div>
                    <div class="calculator-arrow" aria-hidden="true">→</div>
                    <div class="calculator-output-group">
                        <label class="calculator-label">Equivalente en Bolívares</label>
                        <div class="calculator-result">
                            <span class="calculator-result-currency">Bs.</span>
                            <span class="calculator-result-value" id="bsResultValue">—</span>
                        </div>
                    </div>
                </div>
                <div class="calculator-note" id="calculatorNote">
                    <span class="calculator-note-icon">⏳</span>
                    <span>Obteniendo tasa BCV del día…</span>
                </div>
            </div>

            <div class="calc-page-actions">
                <a href="index.html#payment" class="btn btn-secondary">← Volver a Información de Pago</a>
            </div>

        </div>
    </main>

    <!-- FOOTER — rendered by components.js -->
    <footer></footer>

    <script src="components.js"></script>
    <script src="main.js"></script>
</body>
</html>
